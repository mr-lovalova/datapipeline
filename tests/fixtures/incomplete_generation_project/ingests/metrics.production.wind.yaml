id: metrics.production.wind.ingest
from:
  source: incomplete.production
partition_by: municipality

map:
  entrypoint: identity
  args: {}

record:
  - where: { operator: ge, field: time, comparand: "${start_time}" }
  - where: { operator: le, field: time, comparand: "${end_time}" }
  - where: { operator: in, field: municipality, comparand: ["849", "550", "400"] }

