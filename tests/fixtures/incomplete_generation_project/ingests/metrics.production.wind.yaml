id: metrics.production.wind.ingest
from:
  source: incomplete.production
partition_by: municipality
feature_id_by: municipality

map:
  entrypoint: identity
  args: {}

record:
  - { operation: where, operator: ge, field: time, comparand: "${start_time}" }
  - { operation: where, operator: le, field: time, comparand: "${end_time}" }
  - { operation: where, operator: in, field: municipality, comparand: ["849", "550", "400"] }
