  args:
    time_field: HourUTC
    value_field: OnshoreWindMWh
    decimal: ","
    attributes:
      municipality: MunicipalityNo
loader:
  transport: fs
  path: data/incomplete/ProductionMunicipalityHour.csv
  reader:
    format: csv
    delimiter: ";"
