id: metrics.elspot.eur
from:
  source: incomplete.elspot

partition_by: [area]

map:
  entrypoint: identity
  args: {}

preprocess:
  - { operation: where, operator: ge, field: time, comparand: "${start_time}" }
  - { operation: where, operator: le, field: time, comparand: "${end_time}" }

transforms:
  - { operation: ensure_cadence, cadence: 1h }
  - { operation: fill, statistic: mean, window: 2, min_samples: 1, field: value }
