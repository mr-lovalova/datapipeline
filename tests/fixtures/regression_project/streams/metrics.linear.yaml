id: metrics.linear
from:
  source: regression.linear

map:
  entrypoint: identity
  args: {}

preprocess:
  - { operation: where, operator: ge, field: time, comparand: "${start_time}" }
  - { operation: where, operator: le, field: time, comparand: "${end_time}" }

transforms:
  - { operation: ensure_cadence, cadence: 1h }
