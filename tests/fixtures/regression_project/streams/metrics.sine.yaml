id: metrics.sine
from:
  source: regression.sine

map:
  entrypoint: identity
  args: {}

record:
  - where: { operator: ge, field: time, comparand: "${start_time}" }
  - where: { operator: le, field: time, comparand: "${end_time}" }

stream:
  - ensure_cadence: { cadence: 30m, field: value }
  - granularity: { mode: last, field: value }
