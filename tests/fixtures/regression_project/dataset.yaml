sample:
  cadence: 1h

features:
  - id: linear_scaled
    stream: metrics.linear
    field: value
    scale: true
  - id: sine_window
    stream: metrics.sine
    field: value
    sequence:
      size: 2
      stride: 2
  - id: humidity_partitioned
    stream: metrics.humidity
    field: value

targets:
  - id: power_target
    stream: targets.power
    field: value
