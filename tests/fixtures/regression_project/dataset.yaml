sample:
  cadence: 1h

features:
  - id: linear_scaled
    stream: metrics.linear
    field: value
    scale: true
  - id: sine_window
    stream: metrics.sine
    field: value
    sequence:
      size: 2
      stride: 2
  - id: humidity_partitioned
    stream: metrics.humidity
    field: value
  - id: humidity_adjusted
    stream: metrics.humidity.adjusted
    field: value
  - id: humidity_slope
    stream: metrics.humidity.adjusted
    field: slope

targets:
  - id: power_target
    stream: targets.power
    field: value
  - id: power_future_2
    stream: targets.power
    field: future_2

postprocess:
  samples:
    features:
      threshold: 0.5
