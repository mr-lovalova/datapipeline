# See ../../reference/reference/contracts/composed.reference.yaml for full options.
kind: composed
id: equity.pair.aapl_msft
cadence: ${group_by}
inputs:
  - aapl=equity.aapl
  - msft=equity.msft

mapper:
  entrypoint: compose_equity_pair_aapl_msft
  args: { driver: aapl, join: inner }

record:
  - filter: { field: time, operator: ge, comparand: "${start_time}" }
  - filter: { field: time, operator: le, comparand: "${end_time}" }
  - floor_time: { cadence: "${cadence}" }

stream:
  - dedupe: {}
  - granularity: { field: close_ratio, to: close_ratio, mode: first }
  - ensure_cadence: { field: close_ratio, to: close_ratio, cadence: "${cadence}" }

debug:
  - lint: { mode: warn, tick: "${cadence}" }
