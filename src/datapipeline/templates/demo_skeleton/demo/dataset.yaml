# See ../../plugin_skeleton/reference/reference/dataset.yaml for full options.
sample:
  cadence: ${group_by}
  keys: []

features:
  - id: linear_time
    stream: time.ticks.linear
    field: value
    scale: true
    sequence: { size: 2, stride: 1 }

  - id: closing_price
    stream: equity.ohlcv
    field: close
    scale: true

  - id: opening_price
    stream: equity.ohlcv
    field: open
    scale: true
