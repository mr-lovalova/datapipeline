# See ../../plugin_skeleton/reference/reference/dataset.yaml for full options.
sample:
  cadence: ${group_by}
  keys: []

features:
  - id: linear_time
    record_stream: time.ticks.linear
    field: value
    scale: true
    sequence: { size: 2, stride: 1 }

  - id: closing_price
    record_stream: equity.ohlcv
    field: close
    scale: true

  - id: opening_price
    record_stream: equity.ohlcv
    field: open
    scale: true

  - id: pair_close_ratio
    record_stream: equity.pair.aapl_msft
    field: close_ratio
    scale: true

  - id: pair_return_spread
    record_stream: equity.pair.aapl_msft
    field: return_spread_1d
    scale: true
