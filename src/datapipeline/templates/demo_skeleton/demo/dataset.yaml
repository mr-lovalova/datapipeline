sample:
  cadence: ${group_by}
  keys: []

features:
  - id: linear_time
    stream: time.ticks.linear
    field: value
    scale: true
    sequence: { size: 2, stride: 1 }

  - id: closing_price
    stream: equity.ohlcv
    field: close
    scale: true

  - id: opening_price
    stream: equity.ohlcv
    field: open
    scale: true

split:
  mode: time
  intervals:
    - id: train
      until: "2021-01-20T00:00:00Z"
    - id: val
      until: "2021-01-26T00:00:00Z"
    - id: test
  folds:
    - id: holdout
      train: [train]
      validation: [val]
      test: [test]

postprocess:
  columns:
    features:
      threshold: 0.5
  samples:
    features:
      threshold: 1.0
