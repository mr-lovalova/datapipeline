# See ../../../plugin_skeleton/reference/reference/tasks/profiles/serve.reference.yaml for full options.
# Defaults for all serve.<name>.yaml profiles in this project.
# precedence: CLI > serve.<name>.yaml > serve.defaults.yaml > built-ins
cmd: serve
output:
  transport: fs
  format: jsonl
  directory: ./output
observability:
  visuals: ON
  logging:
    level: INFO
    outputs:
      - transport: STDERR
      - transport: FS
        scope: RUN
