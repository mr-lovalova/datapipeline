# Defaults for the inspect command and its inspect.<name>.yaml profiles.
# precedence: CLI > inspect.<name>.yaml > inspect.defaults.yaml > built-ins
# artifact_mode: AUTO
# output:
#   transport: stdout
#   format: txt
observability:
  visuals: ON
  heartbeat_interval_seconds: 60
  logging:
    level: INFO
    outputs:
      - transport: STDERR
