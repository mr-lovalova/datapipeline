# Required identifier for this raw source. Source-backed streams reference it under `from.source`.
id: "sandbox.ohlcv" # suggested format: provider.dataset

# parser.entrypoint: registered parser name (not a file path)
parser:
  entrypoint: "sandbox_ohlcv_dto_parser"
  args: {}

loader:
  transport: fs
  # compression: gzip # only when the matched files are gzip-compressed
  path: data/*.jsonl
  reader:
    format: jsonl
    encoding: utf-8
