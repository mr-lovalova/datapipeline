id: equity.aapl
from:
  source: sandbox.ohlcv
map:
  entrypoint: map_sandbox_ohlcv_dto_to_equity
  args: {}

preprocess:
  - { operation: where, field: time, operator: ge, comparand: "${start_time}" }
  - { operation: where, field: time, operator: le, comparand: "${end_time}" }
  - { operation: where, field: ticker, operator: eq, comparand: "AAPL" }
  - { operation: floor_time, cadence: "${group_by}" }

transforms:
  - operation: dedupe
  - { operation: collapse, keep: first }
  - operation: rolling
    field: dollar_volume
    to: adv5
    window: 5
    statistic: mean
    min_samples: 3
