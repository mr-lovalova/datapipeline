# See ../../reference/reference/streams/ingest.reference.yaml for full options.
id: equity.aapl
from:
  source: sandbox.ohlcv
cadence: ${group_by}

map:
  entrypoint: map_sandbox_ohlcv_dto_to_equity
  args: {}

record:
  - where: { field: time, operator: ge, comparand: "${start_time}" }
  - where: { field: time, operator: le, comparand: "${end_time}" }
  - where: { field: ticker, operator: eq, comparand: "AAPL" }
  - floor_time: { cadence: "${cadence}" }

stream:
  - dedupe: {}
  - granularity: { field: close, mode: first }
  - rolling:
      field: dollar_volume
      to: adv5
      window: 5
      statistic: mean
      min_samples: 3

debug:
  - lint: { mode: warn, tick: "${cadence}" }
