# See ../../reference/reference/streams/ingest.reference.yaml for full options.
id: time.ticks.linear
from:
  source: synthetic.ticks
cadence: ${group_by}

map:
  entrypoint: encode_time
  args: { mode: linear }

record:
  - where: { field: time, operator: ge, comparand: "${start_time}" }
  - where: { field: time, operator: le, comparand: "${end_time}" }
  - floor_time: { cadence: "${cadence}" }

stream:
  - dedupe: {}
  - granularity: { field: value, mode: first }
  - ensure_cadence: { field: value, cadence: "${cadence}" }

debug:
  - lint: { mode: error, tick: "${cadence}" }
