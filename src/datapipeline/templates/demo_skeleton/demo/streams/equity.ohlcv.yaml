id: equity.ohlcv
from:
  source: sandbox.ohlcv
map:
  entrypoint: map_sandbox_ohlcv_dto_to_equity
  args: {}

partition_by: [ticker]

preprocess:
  - { operation: where, field: time, operator: ge, comparand: "${start_time}" }
  - { operation: where, field: time, operator: le, comparand: "${end_time}" }
  - { operation: floor_time, cadence: "${group_by}" }

transforms: # ordered transforms (input sorted by partition,time)
  # - { operation: lag, field: close, to: close_lag_1, periods: 1 }
  # - { operation: lead, field: close, to: close_lead_126, periods: 126 }
  # - { operation: ensure_cadence, cadence: "${group_by}" }
  # - { operation: collapse, keep: first }
  - operation: rolling # compute 5-day average dollar volume (ADV5)
    field: dollar_volume
    to: adv5
    window: 5
    statistic: mean
    min_samples: 3
  - { operation: where, field: adv5, operator: ge, comparand: 1_000_000 } # keep liquid stocks
#   - { operation: fill, field: close, statistic: median, window: 6, min_samples: 1 }
#   - { operation: forward_fill, field: close, to: close_asof }
