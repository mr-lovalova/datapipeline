id: equity.ohlcv # format: domain.dataset.(variant)
from:
  source: sandbox.ohlcv

map:
  entrypoint: map_sandbox_ohlcv_dto_to_equity
  args: {}

cadence: ${group_by} # optional per-stream cadence
partition_by: ticker
# sort_batch_size: 100000              # in-memory sort chunk size

record: # record-level transforms
  - where: { field: time, operator: ge, comparand: "${start_time}" }
  - where: { field: time, operator: le, comparand: "${end_time}" }
  - floor_time: { cadence: "${cadence}" }
#   - shift_time: { by: -10m }

stream: # per-stream transforms (input sorted by partition,time)
  # - lag: { field: close, to: close_lag_1, periods: 1 }
  # - lead: { field: close, to: close_lead_126, periods: 126 }
  # - ensure_cadence: { field: close, cadence: "${cadence}" }
  # - granularity: { field: close, mode: first }
  - rolling: {
        field: dollar_volume,
        to: adv5,
        window: 5,
        statistic: mean,
        min_samples: 3,
      } # compute 5-day average dollar volume (ADV5)
  - where: { field: adv5, operator: ge, comparand: 1_000_000 } # keep liquid stocks
#   - fill: { statistic: median, window: 6, min_samples: 1 }

debug: # optional validation-only checks
  #- lint: { mode: warn, tick: "${cadence}" }
