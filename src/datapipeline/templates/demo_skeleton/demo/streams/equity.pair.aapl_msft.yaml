# See ../../reference/reference/streams/manual.reference.yaml for full options.
id: equity.pair.aapl_msft
cadence: ${group_by}
from:
  streams:
    aapl: equity.aapl
    msft: equity.msft

map:
  entrypoint: manual_equity_pair_aapl_msft
  args: { driver: aapl }

record:
  - where: { field: time, operator: ge, comparand: "${start_time}" }
  - where: { field: time, operator: le, comparand: "${end_time}" }
  - floor_time: { cadence: "${cadence}" }

stream:
  - dedupe: {}
  - granularity: { field: close_ratio, mode: first }
  - ensure_cadence: { field: close_ratio, cadence: "${cadence}" }

debug:
  - lint: { mode: warn, tick: "${cadence}" }
