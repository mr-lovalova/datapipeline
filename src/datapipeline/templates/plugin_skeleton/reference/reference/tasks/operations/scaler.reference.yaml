# Scaler task reference (all options).
# This file is documentation only; uncomment the keys you want to use.
#
# version: 1                # optional
# id: scaler
# kind: artifact            # required; runtime | artifact

# entrypoint: core.artifact.scaler # optional; build runner id
#
# output: build/scaler.json  # optional; relative to project.paths.artifacts
# split_label: train         # optional; split label from project.split
#
# Folded temporal scaling (optional; mutually exclusive with split_label):
# folds:
#   - fit: [train_0]          # split labels used to fit this scaler
#     apply: [train_0, val_0] # split labels scaled with this scaler
#   - fit: [train_1]
#     apply: [train_1, val_1]
