# Build profile reference (all options).
# This file is documentation only; uncomment the keys you want to use.
# Save it as build.<name>.yaml; the filename supplies command and name.
#
# order: 10                   # optional; lower runs first, unset uses filename order
# enabled: true               # optional; profile-level switch
#
# mode: AUTO                  # optional; AUTO | FORCE | "OFF"
# target: schema              # required; artifact task ID from tasks/operations
#
# observability:              # optional
#   visuals: OFF              # optional; ON | OFF
#   heartbeat_interval_seconds: 60 # optional; 0 disables heartbeat log records
#   logging:                  # optional
#     level: INFO             # optional; CRITICAL | ERROR | WARNING | INFO | DEBUG
#     outputs:                # optional; ordered list (GLOBAL scope only)
#       - transport: FS       # STDERR | STDOUT | FS
#         scope: GLOBAL
#         path: ./logs/build.log # resolved relative to project.yaml directory
# note: profiles execute in configured order; the graph orders only each target's internal dependencies.
# note: selected build profiles must have distinct targets.
# note: common pattern: build.scaler (5), build.vector_inputs (8), build.metadata (10), build.schema (20).
# note: common defaults can be set once in profiles/build.defaults.yaml.
# execution.sort_buffer_mb is defaults-only (default 128 MiB per active sort).
# precedence: CLI > build.<name>.yaml > build.defaults.yaml > built-ins
