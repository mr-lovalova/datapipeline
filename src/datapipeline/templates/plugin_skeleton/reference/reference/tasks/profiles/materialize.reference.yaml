# Materialize profile reference (all options).
# This file is documentation only; uncomment the keys you want to use.
#
# cmd: materialize
# name: adv.20               # required; must be unique among materialize profiles
# order: 10                  # optional; lower runs first, unset uses filename order
# enabled: true              # optional
# stream: adv.20             # required; source or derived stream id
# output: data/adv/20.jsonl  # required; relative to project.yaml, or absolute
# as: adv.20.cached          # optional; also write reusable source/ingest YAML
# overwrite: false           # optional; refuse existing output/config files by default
#
# observability:             # optional
#   visuals: ON              # optional; ON | OFF (false -> OFF)
#   heartbeat_interval_seconds: 60 # optional; 0 disables heartbeat log records
#   logging:                 # optional
#     level: INFO            # optional; CRITICAL | ERROR | WARNING | INFO | DEBUG
#     outputs:               # optional; ordered list
#       - transport: STDERR  # STDERR | STDOUT | FS
#       # - transport: FS
#       #   scope: EXECUTION # GLOBAL | EXECUTION
#       #   path: logs/materialize.log
#
# Put shared overwrite/observability values in materialize.defaults.yaml:
#   cmd: materialize
#   overwrite: true
#
# `jerry materialize` runs all enabled profiles in order.
# `jerry materialize --run adv.20` runs one profile.
# CLI `--overwrite` / `--no-overwrite` overrides every selected profile.
# precedence: CLI > materialize.<name>.yaml > materialize.defaults.yaml > built-ins
