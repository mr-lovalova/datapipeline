# Serve profile reference (all options).
# This file is documentation only; uncomment the keys you want to use.
#
# cmd: serve
# name: splits                # required; must be unique among serve profiles
# order: 10                   # optional; lower runs first, unset uses filename order
# target: pipeline            # required; task id from tasks/operations
# enabled: true               # optional
#
# keep: train                  # legacy single-output split label from project.split
# splits: [train, val, test]   # optional; write one fs output per split label
#
# build:                      # optional artifact policy for the target/runtime requirements
#   mode: AUTO                # AUTO | FORCE | OFF
#
# output:                     # optional; omit to use CLI defaults
#   transport: stdout          # stdout | fs
#   format: jsonl
#   # view: raw               # optional; flat | raw
#   #                         # default: jsonl->raw, csv/pickle->flat
#   # encoding: utf-8          # fs jsonl/csv only
#   # fs transport only:
#   # transport: fs
#   # format: csv
#   # directory: artifacts/serve
#   # filename: vectors.train  # no extension, no path separators
#
# limit: 100                  # optional; null = unlimited
# preview_index: 8            # optional; 0-14; null runs the full pipeline
# throttle_ms: 0              # optional; milliseconds; null disables
#
# observability:              # optional
#   visuals: ON               # optional; ON | OFF (false -> OFF)
#   heartbeat_interval_seconds: 60 # optional; 0 disables node heartbeat
#   logging:                  # optional
#     level: INFO             # optional; CRITICAL | ERROR | WARNING | INFO | DEBUG
#     outputs:                # optional; ordered list
#       - transport: STDERR   # STDERR | STDOUT | FS
#       # - transport: FS
#       #   scope: EXECUTION  # GLOBAL | EXECUTION
#       #   path: logs/serve.log  # required for FS+GLOBAL; optional for EXECUTION (default logs/serve.<task>.log)
# note: AUTO expands artifact requirements in dependency order. Profile order is
#       only for separate named steps with distinct policy/output settings.
# precedence: CLI > serve.<name>.yaml > serve.defaults.yaml > built-ins
