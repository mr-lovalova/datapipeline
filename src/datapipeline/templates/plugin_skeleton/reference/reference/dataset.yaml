# Dataset config reference (all options).
# This file is documentation only; uncomment the keys you want to use.
#
# Feature/vector stages require sample.cadence or legacy group_by.
# Cadence must match ^\d+(m|min|h|d)$ (e.g., 10m, 1h, 1d).
#
# sample:                     # preferred
#   cadence: ${group_by}      # required for feature/vector stages
#   keys: []                  # optional row identity fields, e.g. [security_id]
#
# group_by: ${group_by}       # legacy time-only form; same as sample.keys: []
#
# features:                    # optional
#   - id: time_linear
#     record_stream: time.ticks.linear
#     field: value
#     scale: true           # optional; true | false | mapping (see below)
#     # scale:
#     #   model_path: ../artifacts/example/v1/build/scaler.json
#     #   with_mean: true
#     #   with_std: true
#     #   epsilon: 1.0e-12
#     #   on_none: skip      # skip | error
#     sequence: { size: 6, stride: 1 }  # optional
#
# targets:                     # optional
#   - id: some_target
#     record_stream: time.ticks.linear
#     field: value
#     scale: false            # optional
#     sequence: null          # optional
#
# sample.keys creates one vector sample per cadence bucket and key tuple.
# stream partition_by isolates stream state for history-based transforms.
# stream feature_id_by controls feature-id suffixes, e.g. close__@security_id:AAPL.
#
# Record-only stages use only record_stream entries; id/field/scale/sequence are ignored.
