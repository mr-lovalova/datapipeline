# Stream config reference (overview).
# This file is documentation only; uncomment the keys you want to use.
#
# id: domain.dataset.variant
# from:
#   stream: upstream.stream.id  # single upstream stream
# map:                          # optional iterator -> iterable mapping
#   entrypoint: my_mapper
#   args: {}
# partition_by: [station_id]    # optional list; time is reserved
# feature_id_by: []             # optional list; [] requires partition fields in sample.keys
# ordered_by: [station_id, time] # optional list; must equal [*partition_by, time]
#
# stream:                       # optional flat typed stream operations
#   - operation: dedupe
#   - { operation: lag, field: close, to: close_lag_1, periods: 1 }
#   - { operation: lead, field: close, to: close_lead_126, periods: 126 }
#   - { operation: collapse, keep: last } # first | last
#   - { operation: ensure_cadence, cadence: "${group_by}" }
#   - { operation: fill, field: close, statistic: median, window: 6, min_samples: 1 }
#     # statistic: mean | median
#   - { operation: forward_fill, field: close, to: close_asof }
#   - operation: derive
#     left: close_lag_21
#     operator: div
#     right_field: close_lag_189
#     to: close_ratio_21_189
#   - operation: derive
#     left: close_ratio_21_189
#     operator: sub
#     right_value: 1.0
#     to: momentum_189_21
#     # operator: add | sub | mul | div
#
# An aligned stream uses a different callable contract:
# from:
#   align:                      # order defines positional combine arguments
#     - upstream.stream.id
#     - other.stream.id
# combine:                      # required record(s) -> record | None function
#   entrypoint: my_combine_function
#   args: {}
# partition_by is inherited from aligned inputs and cannot be set here.
#
# See also:
# - ingest.reference.yaml
# - aligned.reference.yaml
