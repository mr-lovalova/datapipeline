# Stream config reference (overview).
# This file is documentation only; uncomment the keys you want to use.
#
# id: domain.dataset.variant
# from:
#   source: source.alias        # raw source ingest
#   # OR
#   streams:                    # manual multi-stream mapper
#     alias: upstream.stream.id
#   # OR
#   join:                       # joined stream mapper
#     primary: upstream.stream.id
#     reference: reference.stream.id
#   primary: primary
#   on: time
#   mode: inner
#   broadcast: []
# map:                          # optional for source ingest; required otherwise
#   entrypoint: my_mapper
#   args: {}
# cadence: ${group_by}          # optional per-stream variable for interpolation
# partition_by: station_id      # optional; string or list of strings
# sort_batch_size: 100000       # optional; in-memory chunk size for sorting
#
# record transforms (one-key mappings; optional):
# - where: { field: time, operator: ge, comparand: "${start_time}" }
#   # operator: eq|ne|lt|le|gt|ge|in|nin (aliases: ==, !=, >=, <=, etc.)
# - floor_time: { cadence: "${cadence}" }
# - shift_time: { by: "-1h" }
#
# stream transforms (one-key mappings; optional):
# - dedupe: {}
# - lag: { field: close, to: close_lag_1, periods: 1 }
# - lead: { field: close, to: close_lead_126, periods: 126 }
# - granularity: { field: close, mode: first }   # first | last | mean | median
# - ensure_cadence: { field: close, cadence: "${cadence}" }
# - fill: { field: close, to: close, statistic: median, window: 6, min_samples: 1 }
#   # statistic: mean | median; window must be > 0
#
# debug transforms (one-key mappings; optional):
# - lint: { mode: error, tick: "${cadence}" }  # mode: warn | error
# - identity: {}
#
# See also:
# - ingest.reference.yaml
# - joined.reference.yaml
# - manual.reference.yaml
