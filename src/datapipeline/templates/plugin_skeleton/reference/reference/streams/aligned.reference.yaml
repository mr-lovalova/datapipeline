# Aligned stream reference.
# This file is documentation only; uncomment the keys you want to use.
#
# id: domain.dataset.variant
# from:
#   align:                       # required; order defines combine arguments
#     - upstream.stream.id
#     - other.stream.id
# combine:                       # required
#   entrypoint: my_combine_function
#   args: {}
# feature_id_by: []              # optional list; partition fields must remain identifiable
# ordered_by: [station_id, time] # optional list; inherited partition order + time
#
# Inputs must use the same partition_by and are intersected by partition and
# time. One external sort uses execution.sort_buffer_mb, so inputs need not
# arrive ordered. Each input must contain at most one record per canonical key.
# The function is called as combine(first_record, second_record, ..., **args) and
# may return one record or None to skip that key.
#
# stream:                        # optional transforms after combining
#   - operation: dedupe
