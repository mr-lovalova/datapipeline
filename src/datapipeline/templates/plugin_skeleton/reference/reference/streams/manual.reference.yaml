# Manual stream reference.
# This file is documentation only; uncomment the keys you want to use.
#
# id: domain.dataset.variant
# from:
#   streams:
#     alias: upstream.stream.id
#     other: other.stream.id
# map:                          # required; mapper owns all alignment/cardinality
#   entrypoint: my_manual_mapper
#   args: { driver: alias }
# cadence: ${group_by}          # optional per-stream variable for interpolation
# partition_by: station_id      # optional output partition; string or list of strings
# ordered_by: [station_id, time] # optional; skip sort when mapper already emits this order
# sort_batch_size: 100000       # optional; in-memory chunk size for sorting
#
# stream:                       # optional stream transforms, one-key mappings
#   - dedupe: {}
#   - granularity: { field: close, mode: first }
#
# debug:                        # optional validation-only transforms
#   - lint: { mode: error, tick: "${cadence}" }
#   - identity: {}
