# Joined stream reference.
# This file is documentation only; uncomment the keys you want to use.
#
# id: domain.dataset.variant
# from:
#   join:
#     primary: upstream.stream.id
#     reference: reference.stream.id
#   primary: primary            # output partition is inherited from this input
#   "on": time                  # default: time; use [ticker, time] for compound keys
#   mode: inner                 # inner | left
# map:                          # required; mapper receives one JoinedRow at a time
#   entrypoint: my_joined_mapper
#   args: {}
# cadence: ${group_by}          # optional per-stream variable for interpolation
# ordered_by: [station_id, time] # optional; assert mapper order and validate without sorting
#
# stream:                       # optional stream transforms, one-key mappings
#   - dedupe: {}
#
# debug:                        # optional validation-only transforms
#   - lint: { mode: error, tick: "${cadence}" }
#   - identity: {}
